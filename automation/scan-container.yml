- name: Container STIG Pipeline (Full Pipeline)
  hosts: all
  gather_facts: false

  vars:
    reports_dir: "/home/allensj/projects/security/container-stig-pipeline/reports"
    dashboard_file: "{{ reports_dir }}/dashboard.html"
    timestamp: "{{ lookup('pipe', 'date') }}"

  tasks:

    - name: Ensure reports directory exists
      file:
        path: "{{ reports_dir }}"
        state: directory

    ##################################################
    # BASELINE SCAN
    ##################################################

    - name: Scan baseline image
      command: /usr/bin/trivy image nginx-secure --format json
      register: baseline_scan
      ignore_errors: yes

    - name: Count baseline MEDIUM
      set_fact:
        baseline_medium: "{{ (baseline_scan.stdout | from_json).Results
          | map(attribute='Vulnerabilities') | select('defined')
          | sum(start=[])
          | selectattr('Severity','equalto','MEDIUM')
          | list | length }}"

    ##################################################
    # PRODUCTION SCAN
    ##################################################

    - name: Scan production image
      command: /usr/bin/trivy image nginx-bad --format json
      register: production_scan
      ignore_errors: yes

    - name: Count production MEDIUM
      set_fact:
        production_medium: "{{ (production_scan.stdout | from_json).Results
          | map(attribute='Vulnerabilities') | select('defined')
          | sum(start=[])
          | selectattr('Severity','equalto','MEDIUM')
          | list | length }}"

    ##################################################
    # DASHBOARD
    ##################################################

    - name: Generate dashboard
      copy:
        dest: "{{ dashboard_file }}"
        content: |
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Container Security Dashboard</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #1d1160, #00788c);
                color: white;
                padding: 20px;
              }

              h1 {
                text-align: center;
                color: #00ffff;
              }

              .subtitle {
                text-align: center;
                color: #d7f7ff;
                margin-bottom: 20px;
              }

              .card {
                background-color: rgba(0,0,0,0.6);
                border: 2px solid #00ffff;
                padding: 20px;
                margin: 20px auto;
                border-radius: 12px;
                width: 70%;
                box-shadow: 0 0 15px #00ffff;
              }

              .status-fail {
                color: #ff4d4d;
                font-size: 30px;
                font-weight: bold;
              }

              .status-pass {
                color: #00ffcc;
                font-size: 30px;
                font-weight: bold;
              }
            </style>
          </head>

          <body>

            <h1>🐝 Container Security Dashboard</h1>
            <p class="subtitle">Last Scan: {{ timestamp }}</p>

            <div class="card">
              <h2>Baseline Image</h2>
              <p>Medium: {{ baseline_medium }}</p>
            </div>

            <div class="card">
              <h2>Production Image</h2>
              <p>Medium: {{ production_medium }}</p>
            </div>

            <div class="card">
              <h2>Compliance Status</h2>

              {% if production_medium > baseline_medium %}
              <div class="status-fail">FAILED ❌</div>
              {% else %}
              <div class="status-pass">PASSED ✅</div>
              {% endif %}

              <p>Policy: Production must not exceed baseline vulnerabilities.</p>
            </div>

          </body>
          </html>

    ##################################################
    # DEPLOY TO NGINX
    ##################################################

    - name: Deploy dashboard to nginx
      become: true
      copy:
        src: "{{ dashboard_file }}"
        dest: /var/www/html/index.html
        remote_src: true
