- name: Generate Security Dashboard
  hosts: all
  gather_facts: true

  vars:
    reports_dir: /home/allensj/projects/security/container-stig-pipeline/reports
    dashboard_file: "{{ reports_dir }}/dashboard.html"

  tasks:
    - name: Find latest baseline report
      shell: "ls -t {{ reports_dir }}/baseline-nginx-secure-*.json | head -1"
      register: baseline_file

    - name: Find latest production report
      shell: "ls -t {{ reports_dir }}/production-nginx-bad-*.json | head -1"
      register: production_file

    - name: Load baseline JSON
      slurp:
        src: "{{ baseline_file.stdout }}"
      register: baseline_content

    - name: Load production JSON
      slurp:
        src: "{{ production_file.stdout }}"
      register: production_content

    - name: Parse baseline vulnerabilities
      set_fact:
        baseline_data: "{{ baseline_content.content | b64decode | from_json }}"

    - name: Parse production vulnerabilities
      set_fact:
        production_data: "{{ production_content.content | b64decode | from_json }}"

    - name: Count baseline MEDIUM
      set_fact:
        baseline_medium: "{{ baseline_data.Results | map(attribute='Vulnerabilities') | select('defined') | sum(start=[]) | selectattr('Severity','equalto','MEDIUM') | list | length }}"

    - name: Count production MEDIUM
      set_fact:
        production_medium: "{{ production_data.Results | map(attribute='Vulnerabilities') | select('defined') | sum(start=[]) | selectattr('Severity','equalto','MEDIUM') | list | length }}"

    - name: Determine status
      set_fact:
        compliance_status: >-
          {% if production_medium > baseline_medium %}
          FAILED ❌
          {% else %}
          PASSED ✅
          {% endif %}


    - name: Generate HTML dashboard
  copy:
    dest: "{{ dashboard_file }}"
    content: |
      <html>
      <head>
        <meta charset="UTF-8">
        <title>Container Security Dashboard</title>

        <style>
          body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1d1160, #00788c);
            color: white;
            padding: 20px;
          }

          h1 {
            text-align: center;
            color: #00ffff;
          }

          .card {
            background-color: rgba(0,0,0,0.6);
            border: 2px solid #00ffff;
            padding: 20px;
            margin: 20px auto;
            border-radius: 12px;
            width: 70%;
            box-shadow: 0 0 15px #00ffff;
          }

          .status-pass {
            color: #00ffcc;
            font-size: 32px;
          }

          .status-fail {
            color: #ff4d4d;
            font-size: 32px;
          }

          .label {
            color: #00ffff;
            font-weight: bold;
          }
        </style>
      </head>

      <body>

        <h1>🐝 Container Security Dashboard</h1>

        <div class="card">
          <h2>Baseline Image (nginx-secure)</h2>
          <p><span class="label">Medium Vulnerabilities:</span> {{ baseline_medium }}</p>
        </div>

        <div class="card">
          <h2>Production Image (nginx-bad)</h2>
          <p><span class="label">Medium Vulnerabilities:</span> {{ production_medium }}</p>
        </div>

        <div class="card">
          <h2>Compliance Status</h2>

          {% if production_medium > baseline_medium %}
          <div class="status-fail">FAILED ❌</div>
          {% else %}
          <div class="status-pass">PASSED ✅</div>
          {% endif %}

        </div>

      </body>
      </html>
