- name: Generate Security Dashboard
  hosts: all
  gather_facts: false

  vars:
    dashboard_file: "/home/allensj/projects/security/container-stig-pipeline/reports/dashboard.html"

  tasks:

    - name: Generate HTML dashboard
      copy:
        dest: "{{ dashboard_file }}"
        content: |
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Container Security Dashboard</title>

            <style>
              body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #1d1160, #00788c);
                color: white;
                padding: 20px;
              }

              h1 {
                text-align: center;
                color: #00ffff;
              }

              .subtitle {
                text-align: center;
                color: #d7f7ff;
                font-size: 14px;
                margin-bottom: 30px;
              }

              .card {
                background-color: rgba(0,0,0,0.6);
                border: 2px solid #00ffff;
                padding: 20px;
                margin: 20px auto;
                border-radius: 12px;
                width: 70%;
                box-shadow: 0 0 15px #00ffff;
              }

              .status-pass {
                color: #00ffcc;
                font-size: 32px;
                font-weight: bold;
              }

              .status-fail {
                color: #ff4d4d;
                font-size: 32px;
                font-weight: bold;
              }

              .label {
                color: #00ffff;
                font-weight: bold;
              }
            </style>
          </head>

          <body>

            <h1>🐝 Container Security Dashboard</h1>
            <p class="subtitle">Last Scan: {{ lookup('pipe','date') }}</p>

            <div class="card">
              <h2>Baseline Image (nginx-secure)</h2>
              <p><span class="label">Medium Vulnerabilities:</span> {{ baseline_medium }}</p>
            </div>

            <div class="card">
              <h2>Production Image (nginx-bad)</h2>
              <p><span class="label">Medium Vulnerabilities:</span> {{ production_medium }}</p>
            </div>

            <div class="card">
              <h2>Compliance Status</h2>

              {% if production_medium > baseline_medium %}
              <div class="status-fail">FAILED ❌</div>
              {% else %}
              <div class="status-pass">PASSED ✅</div>
              {% endif %}

              <p class="label">
                Policy: Production image fails when vulnerabilities exceed baseline.
              </p>
            </div>

          </body>
          </html>
